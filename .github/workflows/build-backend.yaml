name: Build & lint backend

on:
  pull_request:
    paths:
      - "backend/**"

  push:
    branches:
      - master
    paths:
      - "backend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: backend
        run: npm install

      # Lint é informativo por enquanto: há dívida de lint pré-existente.
      # Remover o continue-on-error quando o código estiver limpo.
      - name: Lint
        working-directory: backend
        run: npm run lint
        continue-on-error: true

      # Falha apenas em vulnerabilidades de severidade alta/crítica.
      - name: Security audit
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        working-directory: backend
        run: npm run build
